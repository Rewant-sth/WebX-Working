name: CI/CD (VPS)

on:
  push:
    branches: ["master","main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node and pnpm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        run: npm install -g pnpm@9

      # 3️⃣ Deploy to VPS over SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            echo "✅ SSH connection successful!"

            # Navigate to project dir
            cd /var/www/real-himalaya

            echo "📦 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "📥 Installing dependencies (frozen lockfile)..."
            pnpm install --frozen-lockfile

            echo "🛠 Building the project..."
            pnpm build

            echo "🔄 Restarting PM2..."
            if pm2 describe real-himalaya-frontend  > /dev/null 2>&1; then
              pm2 restart real-himalaya-frontend  --time
            else
              pm2 start pnpm --name "real-himalaya-frontend" --time --cwd /var/www/real-himalaya -- start
            fi

            pm2 save
